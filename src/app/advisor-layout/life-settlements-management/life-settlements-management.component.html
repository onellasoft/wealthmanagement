<div class="p-3">
  <!-- Breadcrumb + Header Row -->
  <div class="header-row mb-3">
    <div>
      <nav class="breadcrumb">
        <i class="pi pi-home text-sm mr-1 cursor-pointer" (click)="goBack()"></i>
        <span class="breadcrumb__sep">/</span>
        <span class="breadcrumb__link ml-1">Life Settelements</span>
      </nav>
      <h1 class="page-title">Life Settelements</h1>
    </div>

    <!-- Action Icons -->
    <div class="flex align-items-center gap-2">
      <button class="action-btn action-btn--search" pTooltip="Search" tooltipPosition="bottom">
        <i class="pi pi-search text-base"></i>
      </button>
      <button class="action-btn action-btn--outline" pTooltip="Grid View" tooltipPosition="bottom">
        <i class="pi pi-th-large text-base"></i>
      </button>
      <button class="action-btn action-btn--outline" pTooltip="Export" tooltipPosition="bottom">
        <i class="pi pi-file-export text-base"></i>
      </button>
    </div>
  </div>

  <!-- Table Content -->
  <div class="table-wrapper animate-fade-in">
    <p-table [value]="settlementsData" [paginator]="true" [rows]="10"
      [rowsPerPageOptions]="[10, 20, 50]" styleClass="settlements-table"
      [showCurrentPageReport]="false" [sortMode]="'single'">
      <ng-template #header>
        <tr>
          <th pSortableColumn="firstName">
            <div class="th-content">
              <i class="pi pi-filter th-icon text-xs"></i>
              First Name.
              <p-sortIcon field="firstName" />
            </div>
          </th>
          <th pSortableColumn="lastName">
            <div class="th-content">
              <i class="pi pi-filter th-icon text-xs"></i>
              Last Name
              <p-sortIcon field="lastName" />
            </div>
          </th>
          <th pSortableColumn="phone">
            <div class="th-content">
              <i class="pi pi-filter th-icon text-xs"></i>
              Phone Number
              <p-sortIcon field="phone" />
            </div>
          </th>
          <th pSortableColumn="email">
            <div class="th-content">
              <i class="pi pi-filter th-icon text-xs"></i>
              Email Address
              <p-sortIcon field="email" />
            </div>
          </th>
          <th pSortableColumn="deathBenefit">
            <div class="th-content">
              <i class="pi pi-filter th-icon text-xs"></i>
              Policy Death Benefit
              <p-sortIcon field="deathBenefit" />
            </div>
          </th>
          <th pSortableColumn="age">
            <div class="th-content">
              <i class="pi pi-filter th-icon text-xs"></i>
              Insured Age
              <p-sortIcon field="age" />
            </div>
          </th>
          <th pSortableColumn="health">
            <div class="th-content">
              <i class="pi pi-filter th-icon text-xs"></i>
              Insured Health
              <p-sortIcon field="health" />
            </div>
          </th>
        </tr>
      </ng-template>
      <ng-template #body let-row>
        <tr>
          <td class="text-blue-600 cursor-pointer">{{ row.firstName }}</td>
          <td>{{ row.lastName }}</td>
          <td class="text-blue-600 cursor-pointer">{{ row.phone }}</td>
          <td class="text-blue-600 cursor-pointer">{{ row.email }}</td>
          <td>{{ row.deathBenefit }}</td>
          <td>{{ row.age }}</td>
          <td>{{ row.health }}</td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
