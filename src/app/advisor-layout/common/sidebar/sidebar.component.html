<aside
  class="sidebar"
  [class.sidebar--expanded]="isExpanded"
  (mouseenter)="onMouseEnter()"
  (mouseleave)="onMouseLeave()"
>
  <nav class="sidebar__nav">
    <button
      *ngFor="let item of navItems; let i = index"
      class="sidebar__item"
      [class.sidebar__item--active]="i === activeIndex"
      (click)="navigate(item)"
      [pTooltip]="item.label"
      tooltipPosition="right"
      [tooltipDisabled]="isExpanded"
    >
      <span class="sidebar__icon">
        <i [class]="item.icon + ' text-xl'"></i>
      </span>
      <span class="sidebar__label">{{ item.label }}</span>
    </button>
  </nav>

  <div class="sidebar__bottom">
    <button class="sidebar__item" pTooltip="Log Out" tooltipPosition="right" [tooltipDisabled]="isExpanded" (click)="logout()">
      <span class="sidebar__icon">
        <i class="pi pi-sign-out text-xl"></i>
      </span>
      <span class="sidebar__label">Log Out</span>
    </button>
  </div>
</aside>
