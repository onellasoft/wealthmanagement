<div class="solutions-container p-4">
  <!-- Breadcrumb -->
  <nav class="mb-2">
    <div class="flex align-items-center gap-2 text-xs text-400">
      <i class="pi pi-home"></i>
      <i class="pi pi-angle-right text-xs"></i>
      <span class="color-707eae">Solutions Hub</span>
    </div>
  </nav>

  <!-- Title -->
  <h1 class="text-2xl font-semibold m-0 mb-4 text-primary-dark">Solutions Hub</h1>

  <!-- Brand Tabs (Layer 1) -->
  <div class="brand-tabs mb-4 border-bottom-1 border-100 flex align-items-center gap-4">
    <div *ngFor="let brand of brands" 
         class="brand-tab-item py-2 cursor-pointer transition-all"
         [class.active]="selectedBrand === brand"
         (click)="selectBrand(brand)">
      {{ brand }}
    </div>
  </div>

  <!-- Category Tabs (Layer 2) -->
  <div class="category-tabs mb-5 flex align-items-center gap-2 overflow-x-auto flex-nowrap">
    <div *ngFor="let cat of categories" 
         class="category-tab-item px-3 py-2 border-round-3xl cursor-pointer transition-all whitespace-nowrap"
         [class.active]="selectedCategory === cat"
         (click)="selectCategory(cat)">
      {{ cat }}
    </div>
  </div>

  <!-- Product Grid -->
  <div class="grid">
    <div *ngFor="let product of filteredProducts" class="col-12 xl:col-6 p-3">
      <div class="product-card card p-4 flex align-items-center gap-4 transition-all hover:shadow-2">
        <!-- Illustration -->
        <div class="illustration-container flex-shrink-0 w-8rem h-8rem flex align-items-center justify-content-center">
          <!-- Placeholder icons using PrimeNG or specific svgs -->
          <div *ngIf="product.title === 'Advisor Financing'" class="svg-adv-financing w-full h-full"></div>
          <div *ngIf="product.title === 'High Yield Savings Account'" class="svg-hysa w-full h-full"></div>
          <div *ngIf="product.title === 'Mortgage, Refinancing, & HELOC'" class="svg-mortgage w-full h-full"></div>
          <div *ngIf="product.title === 'Securities-Backed Loan'" class="svg-sbl w-full h-full"></div>
        </div>

        <!-- Content -->
        <div class="product-content flex-grow-1">
          <h2 class="text-xl font-bold m-0 mb-1 text-primary-dark">{{ product.title }}</h2>
          <div class="flex align-items-center gap-2 mb-3 text-secondary-dark">
            <i [class]="product.providerIcon" class="text-xs"></i>
            <span class="text-sm font-semibold">{{ product.provider }}</span>
          </div>
          <p class="text-sm color-707eae m-0 mb-4 line-height-3">
            {{ product.description }}
          </p>

          <button class="view-more-btn flex align-items-center gap-2 px-4 py-2 border-round-sm border-none cursor-pointer transition-all">
            <i class="pi pi-arrow-right text-xs"></i>
            <span class="text-sm font-medium">View More</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
